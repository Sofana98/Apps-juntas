<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="S&G">
<title>Finanzas S&G</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html { font-size: 16px; }
body { background: #F7F6F2; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; color: #1A1916; min-height: 100vh; }
.app { max-width: 430px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }

/* LOGIN */
.login-screen { display: none; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; padding: 32px 24px; max-width: 430px; margin: 0 auto; }
.login-screen.active { display: flex; }
.login-emoji { font-size: 52px; margin-bottom: 16px; }
.login-title { font-size: 26px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
.login-sub { font-size: 15px; color: #888; margin-bottom: 48px; text-align: center; }
.login-btns { display: flex; flex-direction: column; gap: 14px; width: 100%; }
.login-btn { width: 100%; padding: 20px; border: 2px solid #E0DDD6; border-radius: 16px; font-size: 20px; font-weight: 800; cursor: pointer; background: #fff; font-family: inherit; text-align: center; touch-action: manipulation; }
.login-btn.sofi { border-color: #F0B8CB; color: #C9406A; background: #FDF0F4; }
.login-btn.guille { border-color: #BFDBFE; color: #2563EB; background: #EFF6FF; }

/* HEADER */
.header { background: #1A1916; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 20; }
.header-left { display: flex; flex-direction: column; }
.header-title { font-size: 18px; font-weight: 800; letter-spacing: -0.5px; color: #fff; }
.header-title span { color: #F0C040; }
.header-user { font-size: 12px; font-weight: 700; color: #F0C040; margin-top: 1px; }
.header-right { display: flex; align-items: center; gap: 8px; }
.sync-pill { display: flex; align-items: center; gap: 5px; font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 20px; }
.sync-pill.ok { background: rgba(22,163,74,0.2); color: #4ade80; border: 1px solid rgba(74,222,128,0.3); }
.sync-pill.syncing { background: rgba(217,119,6,0.2); color: #fbbf24; border: 1px solid rgba(251,191,36,0.3); }
.sync-pill.error { background: rgba(220,38,38,0.2); color: #f87171; border: 1px solid rgba(248,113,113,0.3); }
.sync-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; flex-shrink: 0; }
.switch-btn { font-size: 11px; font-weight: 600; padding: 5px 10px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.2); background: rgba(255,255,255,0.1); color: #fff; cursor: pointer; touch-action: manipulation; }
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.2} }
.blink { animation: blink 1s infinite; }

/* TABS */
.tabs { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; background: #fff; border-bottom: 1px solid #E8E4DC; position: sticky; top: 61px; z-index: 19; }
.tab { padding: 11px 4px; text-align: center; font-size: 12px; font-weight: 600; color: #999; cursor: pointer; border-bottom: 2px solid transparent; transition: color 0.15s; letter-spacing: 0.01em; }
.tab.active { color: #1A1916; border-bottom-color: #F0C040; }

.content { flex: 1; }
.section { display: none; padding: 14px 14px 90px; }
.section.active { display: block; }

/* CARDS & FIELDS */
.card { background: #fff; border: 1px solid #E8E4DC; border-radius: 16px; padding: 16px; margin-bottom: 12px; }
.card-title { font-size: 11px; font-weight: 800; color: #aaa; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 14px; }
.field { margin-bottom: 15px; }
.field:last-child { margin-bottom: 0; }
.field > label { display: block; font-size: 11px; font-weight: 700; color: #888; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.07em; }
.field input[type=text], .field input[type=number], .field input[type=date], .field select { width: 100%; font-size: 16px; color: #1A1916; background: #F7F6F2; border: 1px solid #E0DDD6; border-radius: 10px; padding: 11px 13px; font-family: inherit; outline: none; -webkit-appearance: none; appearance: none; }
.field input:focus, .field select:focus { border-color: #1A1916; background: #fff; }
.toggle-row { display: flex; gap: 8px; flex-wrap: wrap; }
.tb { flex: 1; min-width: 60px; padding: 11px 6px; border: 1.5px solid #E0DDD6; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; background: #F7F6F2; color: #999; font-family: inherit; text-align: center; -webkit-appearance: none; touch-action: manipulation; transition: all 0.12s; }
.tb.sel { background: #fff; border-color: #1A1916; color: #1A1916; }
.tb.sel.sofi-s { background: #FDF0F4; border-color: #C9406A; color: #C9406A; }
.tb.sel.guille-s { background: #EFF6FF; border-color: #2563EB; color: #2563EB; }
.tb.sel.gasto-s { background: #FEF2F2; border-color: #DC2626; color: #DC2626; }
.tb.sel.ingreso-s { background: #F0FDF4; border-color: #16A34A; color: #16A34A; }
.save-btn { width: 100%; padding: 15px; background: #1A1916; color: #fff; border: none; border-radius: 12px; font-size: 16px; font-weight: 800; cursor: pointer; font-family: inherit; margin-top: 4px; letter-spacing: -0.2px; touch-action: manipulation; }
.save-btn:disabled { opacity: 0.4; }
.save-btn.editing { background: #2563EB; }
.cancel-btn { width: 100%; padding: 13px; background: transparent; color: #888; border: 1px solid #E0DDD6; border-radius: 12px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: inherit; margin-top: 8px; touch-action: manipulation; }
.edit-banner { background: #EFF6FF; border: 1px solid #BFDBFE; border-radius: 10px; padding: 10px 14px; margin-bottom: 12px; font-size: 13px; color: #2563EB; font-weight: 600; }

/* HISTORIAL */
.month-sel { margin-bottom: 12px; }
.month-sel select { width: 100%; font-size: 15px; background: #fff; border: 1px solid #E8E4DC; border-radius: 10px; padding: 10px 13px; font-family: inherit; -webkit-appearance: none; color: #1A1916; outline: none; }
.entry { padding: 12px 0; border-bottom: 1px solid #F0EDE6; }
.entry:last-child { border-bottom: none; }
.entry-top { display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; }
.entry-name { font-size: 15px; font-weight: 600; }
.entry-cat { font-size: 12px; color: #999; margin-top: 2px; }
.entry-right { display: flex; align-items: center; gap: 4px; flex-shrink: 0; }
.entry-amount { font-size: 16px; font-weight: 800; }
.ag { color: #DC2626; } .ai { color: #16A34A; }
.edit-btn { background: none; border: none; color: #bbb; cursor: pointer; font-size: 15px; padding: 4px 5px; touch-action: manipulation; }
.del-btn { background: none; border: none; color: #ccc; cursor: pointer; font-size: 16px; padding: 4px 5px; touch-action: manipulation; }
.entry-meta { display: flex; gap: 5px; margin-top: 7px; flex-wrap: wrap; align-items: center; }
.badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
.bs { background: #FDF0F4; color: #C9406A; }
.bg { background: #EFF6FF; color: #2563EB; }
.bc { background: #F0FDF4; color: #16A34A; }
.bx { background: #F5F4F0; color: #666; border: 1px solid #E0DDD6; }
.bt { background: #FFF7ED; color: #C2410C; }
.bp { background: #F5F3FF; color: #6D28D9; }
.edate { font-size: 11px; color: #bbb; }
.empty { text-align: center; padding: 40px 20px; color: #bbb; font-size: 14px; }
.lmsg { text-align: center; padding: 32px; color: #bbb; font-size: 14px; }
.filter-tabs { display: flex; gap: 8px; margin-bottom: 12px; }
.ftab { flex: 1; padding: 9px 6px; text-align: center; font-size: 12px; font-weight: 700; border-radius: 10px; cursor: pointer; border: 1.5px solid #E0DDD6; color: #999; background: #fff; touch-action: manipulation; }
.ftab.active { border-color: #1A1916; color: #1A1916; background: #F7F6F2; }

/* RESUMEN */
.stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 12px; }
.stat { background: #fff; border: 1px solid #E8E4DC; border-radius: 12px; padding: 13px 14px; }
.slabel { font-size: 11px; font-weight: 700; color: #aaa; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 5px; }
.sval { font-size: 20px; font-weight: 800; color: #1A1916; letter-spacing: -0.5px; }
.sval.red { color: #DC2626; } .sval.green { color: #16A34A; }

/* BALANCE */
.balance-card { border-radius: 16px; padding: 16px; margin-bottom: 12px; border: 1px solid #FDE68A; background: #FFFBEB; cursor: pointer; }
.balance-card.ok { border-color: #BBF7D0; background: #F0FDF4; cursor: default; }
.b-label { font-size: 11px; font-weight: 800; color: #92400E; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 6px; }
.balance-card.ok .b-label { color: #166534; }
.b-main { font-size: 18px; font-weight: 800; color: #B45309; letter-spacing: -0.4px; }
.balance-card.ok .b-main { color: #16A34A; }
.b-tap { font-size: 11px; color: #B45309; margin-top: 5px; opacity: 0.7; }
.b-detail { display: none; margin-top: 12px; border-top: 1px solid #FDE68A; padding-top: 12px; }
.b-detail.open { display: block; }
.b-section-title { font-size: 11px; font-weight: 800; color: #92400E; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 8px; margin-top: 12px; }
.b-section-title:first-child { margin-top: 0; }
.b-item { display: flex; justify-content: space-between; align-items: flex-start; padding: 6px 0; border-bottom: 1px solid #FEF3C7; gap: 8px; }
.b-item:last-child { border-bottom: none; }
.b-item-name { font-size: 13px; color: #78350F; flex: 1; }
.b-item-amt { font-size: 13px; font-weight: 700; color: #B45309; flex-shrink: 0; }
.b-pago { display: flex; justify-content: space-between; padding: 5px 0; }
.b-pago-name { font-size: 12px; color: #166534; }
.b-pago-amt { font-size: 12px; font-weight: 700; color: #16A34A; }

/* SALDO ANTERIOR */
.saldo-card { background: #F0F9FF; border: 1px solid #BAE6FD; border-radius: 12px; padding: 12px 14px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; }
.saldo-label { font-size: 11px; font-weight: 800; color: #0369A1; text-transform: uppercase; letter-spacing: 0.06em; }
.saldo-val { font-size: 14px; font-weight: 800; color: #0369A1; }

/* BAR CHART */
.bar-row { margin-bottom: 11px; }
.bar-label { display: flex; justify-content: space-between; margin-bottom: 4px; }
.bar-name { font-size: 13px; color: #1A1916; }
.bar-val { font-size: 13px; font-weight: 700; }
.bar-track { height: 5px; background: #F0EDE6; border-radius: 3px; }
.bar-fill { height: 5px; border-radius: 3px; background: #1A1916; }

/* SUBS */
.porc-row { display: flex; gap: 10px; align-items: center; margin-bottom: 8px; }
.porc-label { font-size: 14px; font-weight: 600; white-space: nowrap; min-width: 65px; }
.subs-info { background: #F5F3FF; border: 1px solid #DDD6FE; border-radius: 10px; padding: 10px 14px; margin-top: 8px; font-size: 13px; color: #6D28D9; line-height: 1.6; }

/* TOAST */
.toast { position: fixed; bottom: 28px; left: 50%; transform: translateX(-50%); background: #1A1916; color: #fff; padding: 12px 22px; border-radius: 10px; font-size: 14px; font-weight: 600; opacity: 0; transition: opacity 0.2s; pointer-events: none; z-index: 999; white-space: nowrap; max-width: 88vw; }
.toast.show { opacity: 1; }
.sec-label { font-size: 11px; font-weight: 800; color: #bbb; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 10px; margin-top: 4px; }
</style>
</head>
<body>

<!-- LOGIN -->
<div id="login-screen" class="login-screen active">
  <div class="login-emoji">💰</div>
  <div class="login-title">Finanzas S&amp;G</div>
  <div class="login-sub">Hola! Toca tu nombre para continuar</div>
  <div class="login-btns">
    <button type="button" class="login-btn sofi" id="btn-sofi">🌸 Sofi</button>
    <button type="button" class="login-btn guille" id="btn-guille">💡 Guille</button>
  </div>
</div>

<!-- MAIN APP -->
<div id="main-app" style="display:none">
<div class="app">
  <div class="header">
    <div class="header-left">
      <div class="header-title">Finanzas <span>S&amp;G</span></div>
      <div class="header-user" id="header-user"></div>
    </div>
    <div class="header-right">
      <div class="sync-pill syncing" id="spill">
        <div class="sync-dot blink" id="sdot"></div>
        <span id="stxt">Conectando</span>
      </div>
      <button type="button" class="switch-btn" id="btn-cambiar">Cambiar</button>
    </div>
  </div>
  <div class="tabs">
    <div class="tab active" id="tbtn-gastos">💸 Gastos</div>
    <div class="tab" id="tbtn-tarjetas">💳 Tarjetas</div>
    <div class="tab" id="tbtn-historial">📋 Historial</div>
    <div class="tab" id="tbtn-resumen">📊 Resumen</div>
  </div>
  <div class="content">

    <!-- TAB: GASTOS -->
    <div id="tab-gastos" class="section active">
      <div id="edit-banner-g" class="edit-banner" style="display:none">✏️ Editando gasto — modificá los campos y guardá</div>
      <div class="card">
        <div class="field">
          <label>Tipo</label>
          <div class="toggle-row">
            <button type="button" class="tb sel gasto-s" data-group="g-tipo" data-val="Gasto">Gasto</button>
            <button type="button" class="tb ingreso-s" data-group="g-tipo" data-val="Ingreso">Ingreso</button>
          </div>
        </div>
        <div class="field">
          <label>Quien carga</label>
          <div class="toggle-row" id="g-pag-row">
            <button type="button" class="tb sel sofi-s" data-group="g-pag" data-val="Sofi">Sofi</button>
            <button type="button" class="tb guille-s" data-group="g-pag" data-val="Guille">Guille</button>
          </div>
        </div>
        <div class="field">
          <label>Fecha</label>
          <input type="date" id="g-fecha" />
        </div>
        <div class="field">
          <label>Categoria</label>
          <select id="g-cat"></select>
        </div>
        <div class="field">
          <label>Subcategoria</label>
          <select id="g-subcat"></select>
        </div>
        <div class="field">
          <label>Detalle</label>
          <input type="text" id="g-detalle" placeholder="Ej: verduleria, farmacia..." autocomplete="off" />
        </div>
        <div class="field">
          <label>Importe ($)</label>
          <input type="number" id="g-importe" placeholder="0" inputmode="decimal" min="0" />
        </div>
        <div class="field">
          <label>Medio de pago</label>
          <div class="toggle-row">
            <button type="button" class="tb sel" data-group="g-med" data-val="Efectivo">Efectivo</button>
            <button type="button" class="tb" data-group="g-med" data-val="Transferencia">Transfer.</button>
            <button type="button" class="tb" data-group="g-med" data-val="Tarjeta">Tarjeta</button>
          </div>
        </div>
        <div class="field" id="g-comp-field">
          <label>Compartido?</label>
          <div class="toggle-row">
            <button type="button" class="tb" data-group="g-comp" data-val="Si">Si</button>
            <button type="button" class="tb sel" data-group="g-comp" data-val="No">No</button>
          </div>
        </div>
        <div class="field" id="g-debe-field" style="display:none">
          <label>Quien debe la mitad?</label>
          <div class="toggle-row">
            <button type="button" class="tb sofi-s" data-group="g-debe" data-val="Sofi">Sofi</button>
            <button type="button" class="tb guille-s" data-group="g-debe" data-val="Guille">Guille</button>
          </div>
        </div>
      </div>
      <button type="button" class="save-btn" id="g-savebtn">Guardar gasto</button>
      <button type="button" class="cancel-btn" id="g-cancelbtn" style="display:none">Cancelar edicion</button>
    </div>

    <!-- TAB: TARJETAS -->
    <div id="tab-tarjetas" class="section">
      <div id="edit-banner-t" class="edit-banner" style="display:none">✏️ Editando tarjeta — modifica los campos y guarda</div>
      <div class="card">
        <div class="field">
          <label>Tarjeta</label>
          <select id="t-tarjeta">
            <option>MACRO Sofi</option>
            <option>NARANJA Sofi</option>
            <option>BBVA Guille</option>
            <option>MACRO Guille</option>
            <option>MERCADO PAGO Guille</option>
          </select>
        </div>
        <div class="field">
          <label>Fecha primera cuota</label>
          <input type="date" id="t-fecha" />
        </div>
        <div class="field">
          <label>Detalle</label>
          <input type="text" id="t-detalle" placeholder="Ej: Netflix, ropa..." autocomplete="off" />
        </div>
        <div class="field">
          <label>Importe por cuota ($)</label>
          <input type="number" id="t-importe" placeholder="0" inputmode="decimal" min="0" />
        </div>
        <div class="field">
          <label>Cuotas</label>
          <select id="t-cuotas">
            <option value="1">1 cuota (contado)</option>
            <option value="2">2 cuotas</option>
            <option value="3">3 cuotas</option>
            <option value="4">4 cuotas</option>
            <option value="5">5 cuotas</option>
            <option value="6">6 cuotas</option>
            <option value="7">7 cuotas</option>
            <option value="8">8 cuotas</option>
            <option value="9">9 cuotas</option>
            <option value="10">10 cuotas</option>
            <option value="11">11 cuotas</option>
            <option value="12">12 cuotas</option>
            <option value="18">18 cuotas</option>
            <option value="24">24 cuotas</option>
          </select>
        </div>
        <div class="field">
          <label>Tipo de gasto</label>
          <div class="toggle-row">
            <button type="button" class="tb sel" data-group="t-tipo" data-val="propio">Solo mio</button>
            <button type="button" class="tb" data-group="t-tipo" data-val="compartido">Compartido</button>
            <button type="button" class="tb" data-group="t-tipo" data-val="suscripcion">Suscripcion</button>
          </div>
        </div>
        <div class="field" id="t-comp-field" style="display:none">
          <label>Cuanto paga cada uno por cuota?</label>
          <div class="porc-row">
            <span class="porc-label" style="color:#C9406A;">Sofi $</span>
            <input type="number" id="t-porc-sofi" placeholder="0" inputmode="decimal" min="0" />
          </div>
          <div class="porc-row">
            <span class="porc-label" style="color:#2563EB;">Guille $</span>
            <input type="number" id="t-porc-guille" placeholder="0" inputmode="decimal" min="0" />
          </div>
        </div>
        <div class="field" id="t-subs-field" style="display:none">
          <label>Suscripcion</label>
          <select id="t-subs-tipo">
            <option value="prime">Prime Video (Sofi, Guille, Santi)</option>
            <option value="youtube">YouTube (Sofi, Guille, Santi, Pablo, Alicia, Fran)</option>
          </select>
          <div class="subs-info" id="t-subs-info"></div>
        </div>
      </div>
      <button type="button" class="save-btn" id="t-savebtn">Guardar tarjeta</button>
      <button type="button" class="cancel-btn" id="t-cancelbtn" style="display:none">Cancelar edicion</button>
    </div>

    <!-- TAB: HISTORIAL -->
    <div id="tab-historial" class="section">
      <div class="month-sel"><select id="h-mes"></select></div>
      <div class="filter-tabs">
        <div class="ftab active" id="ftab-todo" data-filter="todo">Todo</div>
        <div class="ftab" id="ftab-gastos" data-filter="gastos">Gastos</div>
        <div class="ftab" id="ftab-tarjetas" data-filter="tarjetas">Tarjetas</div>
      </div>
      <div class="card" id="h-list"><div class="lmsg">Cargando...</div></div>
    </div>

    <!-- TAB: RESUMEN -->
    <div id="tab-resumen" class="section">
      <div class="month-sel"><select id="r-mes"></select></div>
      <div id="r-content"><div class="lmsg">Cargando...</div></div>
    </div>

  </div>
</div>
</div>
<div class="toast" id="toast"></div>

<script>
var SCRIPT = 'https://script.google.com/macros/s/AKfycby3HJkQJwHEdfz55BLdNVFvtSkYujxWDhsGodYSsgbNidT9lLzaPhKxBjqxWkBLNdPVow/exec';
var CSV_GASTOS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQpl0BNS9VcV4a-q7qdC2qoKnKa43_czkt25NG_g6vdlCiiLRa8oAugERfiqHQghf81h6n5LhGjz5ao/pub?gid=0&single=true&output=csv';
var CSV_TARJETAS = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQpl0BNS9VcV4a-q7qdC2qoKnKa43_czkt25NG_g6vdlCiiLRa8oAugERfiqHQghf81h6n5LhGjz5ao/pub?gid=1931615473&single=true&output=csv';

var CATS = {
  "Hogar":["Alquiler","Expensas","Supermercado","Verduras / Frutas","Pollo / Carne","Bidon de Agua","Desayuno / Merienda","Mantenimiento Depto","Delivery"],
  "Servicios":["Luz","Agua","Gas","Internet"],

// ── UTILS ──
function todayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + ('0'+(d.getMonth()+1)).slice(-2) + '-' + ('0'+d.getDate()).slice(-2);
}
function mk(f) {
  var d = new Date(f);
  if (isNaN(d.getTime())) return '';
  return d.getFullYear() + '-' + d.getMonth();
}
function ars(n) { return '$' + Math.round(n).toLocaleString('es-AR'); }
function fmtDate(f) { return new Date(f).toLocaleDateString('es-AR', { day:'numeric', month:'short' }); }
function curMK() { var d = new Date(); return d.getFullYear() + '-' + d.getMonth(); }

function sync(s) {
  var p = document.getElementById('spill'), d = document.getElementById('sdot'), t = document.getElementById('stxt');
  p.className = 'sync-pill ' + s;
  d.className = 'sync-dot' + (s === 'syncing' ? ' blink' : '');
  t.textContent = s === 'ok' ? 'Sincronizado' : s === 'syncing' ? 'Sincronizando' : 'Sin conexion';
}
function toast(msg) {
  var el = document.getElementById('toast');
  el.textContent = msg; el.classList.add('show');
  setTimeout(function(){ el.classList.remove('show'); }, 2500);
}
function parseCSV(text) {
  return text.trim().split('\n').map(function(line) {
    var result = [], cur = '', inQ = false;
    for (var i = 0; i < line.length; i++) {
      var c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { result.push(cur.trim()); cur = ''; }
      else { cur += c; }
    }
    result.push(cur.trim());
    return result;
  });
}

// ── DATA LOADING ──
function loadAll(cb) {
  sync('syncing');
  var doneG = false, doneT = false, errored = false;
  function check() {
    if (doneG && doneT) { sync('ok'); fillMonths(); if (cb) cb(); }
  }
  fetch(CSV_GASTOS + '&t=' + Date.now())
    .then(function(r){ return r.text(); })
    .then(function(text) {
      entriesG = parseCSV(text).map(function(r) {
        return { id: String(r[0]), fecha: r[1], tipo: r[2], pagador: r[3], categoria: r[4],
                 subcategoria: r[5], detalle: r[6], importe: parseFloat(r[7])||0,
                 medio: r[8], compartido: r[9], quienDebe: r[10]||'' };
      }).filter(function(e){ return e.detalle && e.detalle.length > 0; });
      doneG = true; check();
    })
    .catch(function(){ if (!errored){ errored=true; sync('error'); toast('Sin conexion'); } doneG=true; check(); });

  fetch(CSV_TARJETAS + '&t=' + Date.now())
    .then(function(r){ return r.text(); })
    .then(function(text) {
      entriesT = parseCSV(text).map(function(r) {
        return { id: String(r[0]), fecha: r[1], tarjeta: r[2], detalle: r[3],
                 importe: parseFloat(r[4])||0, cuotas: parseInt(r[5])||1,
                 cuotaActual: parseInt(r[6])||1, compartido: r[7],
                 montSofi: parseFloat(r[8])||0, montGuille: parseFloat(r[9])||0,
                 tipoGasto: r[10]||'propio', subsKey: r[11]||'' };
      }).filter(function(e){ return e.detalle && e.detalle.length > 0; });
      doneT = true; check();
    })
    .catch(function(){ if (!errored){ errored=true; sync('error'); toast('Sin conexion'); } doneT=true; check(); });
}

function postGasto(body, cb) {
  sync('syncing');
  fetch(SCRIPT, { method:'POST', headers:{'Content-Type':'text/plain'}, body: JSON.stringify(body) })
    .then(function(r){ return r.text(); })
    .then(function(){ sync('ok'); if (cb) cb(true); })
    .catch(function(){ sync('error'); if (cb) cb(false); });
}
function postTarjeta(body, cb) {
  body.hoja = 'tarjetas'; sync('syncing');
  fetch(SCRIPT, { method:'POST', headers:{'Content-Type':'text/plain'}, body: JSON.stringify(body) })
    .then(function(r){ return r.text(); })
    .then(function(){ sync('ok'); if (cb) cb(true); })
    .catch(function(){ sync('error'); if (cb) cb(false); });
}

// ── MONTHS ──
function fillMonths() {
  var keys = [];
  entriesG.concat(entriesT).forEach(function(e){ var k=mk(e.fecha); if(k&&keys.indexOf(k)<0) keys.push(k); });
  keys.sort().reverse();
  var cur = curMK();
  if (keys.indexOf(cur)<0) keys.unshift(cur);
  var opts = keys.map(function(k){ var p=k.split('-'); return '<option value="'+k+'">'+MESES[+p[1]]+' '+p[0]+'</option>'; }).join('');
  document.getElementById('h-mes').innerHTML = opts;
  document.getElementById('r-mes').innerHTML = opts;
  document.getElementById('h-mes').value = cur;
  document.getElementById('r-mes').value = cur;
}

// ── BALANCE ACUMULADO ──
// Calcula el neto (positivo = Sofi le debe a Guille) para un key de mes dado
function calcNetoMes(key) {
  var gs = entriesG.filter(function(e){ return mk(e.fecha)===key; });
  var ts = entriesT.filter(function(e){ return mk(e.fecha)===key; });

  var compSofi = gs.filter(function(e){ return e.tipo==='Gasto' && e.quienDebe==='Sofi'; });
  var compGuille = gs.filter(function(e){ return e.tipo==='Gasto' && e.quienDebe==='Guille'; });
  var dSofiG = compSofi.reduce(function(a,b){ return a+b.importe/2; },0);
  var dGuilleG = compGuille.reduce(function(a,b){ return a+b.importe/2; },0);

  var pagosGuilleG = gs.filter(function(e){ return e.subcategoria==='Guille pago a Sofi'; });
  var pagosSofiG = gs.filter(function(e){ return e.subcategoria==='Sofi pago a Guille'; });
  var tPagGuilleG = pagosGuilleG.reduce(function(a,b){ return a+b.importe; },0);
  var tPagSofiG = pagosSofiG.reduce(function(a,b){ return a+b.importe; },0);

  var guilleDebe = 0, sofiDebe = 0;
  ts.forEach(function(e){
    var m = getTCardMontos(e);
    var esTarSofi = e.tarjeta.indexOf('Sofi')>=0;
    if (esTarSofi) guilleDebe += m.guille;
    else sofiDebe += m.sofi;
  });

  var sofiDebeTotal = Math.max(0, dSofiG + sofiDebe - tPagSofiG);
  var guilleDebeTotal = Math.max(0, dGuilleG + guilleDebe - tPagGuilleG);
  return sofiDebeTotal - guilleDebeTotal; // positivo = Sofi le debe a Guille
}

// Suma el saldo acumulado de todos los meses anteriores al mes dado
function calcSaldoAnterior(key) {
  var p = key.split('-');
  var year = parseInt(p[0]), month = parseInt(p[1]);
  var total = 0;
  var keys = [];
  entriesG.concat(entriesT).forEach(function(e){ var k=mk(e.fecha); if(k&&keys.indexOf(k)<0) keys.push(k); });
  keys.forEach(function(k) {
    var kp = k.split('-');
    var ky = parseInt(kp[0]), km = parseInt(kp[1]);
    if (ky < year || (ky === year && km < month)) {
      total += calcNetoMes(k);
    }
  });
  return total;
}

// ── HISTORIAL ──
document.getElementById('h-mes').addEventListener('change', renderHist);
document.querySelectorAll('.ftab').forEach(function(ft){
  ft.addEventListener('click', function(){
    document.querySelectorAll('.ftab').forEach(function(x){ x.classList.remove('active'); });
    ft.classList.add('active');
    histFilter = ft.getAttribute('data-filter');
    renderHist();
  });
});

function renderHist() {
  var key = document.getElementById('h-mes').value;
  var listG = entriesG.filter(function(e){ return mk(e.fecha)===key; }).map(function(e){ return Object.assign({}, e, {_src:'gastos'}); });
  var listT = entriesT.filter(function(e){ return mk(e.fecha)===key; }).map(function(e){ return Object.assign({}, e, {_src:'tarjetas'}); });
  var list = histFilter==='gastos' ? listG : histFilter==='tarjetas' ? listT : listG.concat(listT);
  list.sort(function(a,b){ return new Date(b.fecha)-new Date(a.fecha); });
  var el = document.getElementById('h-list');
  if (!list.length) { el.innerHTML='<div class="empty">Sin registros este mes</div>'; return; }
  el.innerHTML = list.map(function(e) {
    if (e._src==='gastos') {
      return '<div class="entry">'
        +'<div class="entry-top"><div style="min-width:0;flex:1;">'
        +'<div class="entry-name">'+e.detalle+'</div>'
        +'<div class="entry-cat">'+e.categoria+' › '+e.subcategoria+'</div>'
        +'</div><div class="entry-right">'
        +'<div class="entry-amount '+(e.tipo==='Gasto'?'ag':'ai')+'">'+(e.tipo==='Gasto'?'-':'+')+ars(e.importe)+'</div>'
        +'<button type="button" class="edit-btn" data-id="'+e.id+'" data-src="gastos">✏️</button>'
        +'<button type="button" class="del-btn" data-id="'+e.id+'" data-src="gastos">✕</button>'
        +'</div></div>'
        +'<div class="entry-meta">'
        +'<span class="badge bx">Gasto</span>'
        +'<span class="badge '+(e.pagador==='Sofi'?'bs':'bg')+'">'+e.pagador+'</span>'
        +'<span class="badge bx">'+e.medio+'</span>'
        +(e.compartido==='Si'?'<span class="badge bc">Debe: '+e.quienDebe+'</span>':'')
        +'<span class="edate">'+fmtDate(e.fecha)+'</span>'
        +'</div></div>';
    } else {
      var cuotaLabel = e.cuotas>1 ? 'C'+e.cuotaActual+'/'+e.cuotas : 'Contado';
      var esSofiCard = e.tarjeta.indexOf('Sofi')>=0;
      return '<div class="entry">'
        +'<div class="entry-top"><div style="min-width:0;flex:1;">'
        +'<div class="entry-name">'+e.detalle+'</div>'
        +'<div class="entry-cat">'+e.tarjeta+'</div>'
        +'</div><div class="entry-right">'
        +'<div class="entry-amount ag">'+ars(e.importe)+'</div>'
        +'<button type="button" class="edit-btn" data-id="'+e.id+'" data-src="tarjetas">✏️</button>'
        +'<button type="button" class="del-btn" data-id="'+e.id+'" data-src="tarjetas">✕</button>'
        +'</div></div>'
        +'<div class="entry-meta">'
        +'<span class="badge bx">Tarjeta</span>'
        +'<span class="badge '+(esSofiCard?'bs':'bg')+'">'+(esSofiCard?'Sofi':'Guille')+'</span>'
        +'<span class="badge bt">'+cuotaLabel+'</span>'
        +(e.tipoGasto==='compartido'?'<span class="badge bc">Compartido</span>':'')
        +(e.tipoGasto==='suscripcion'&&SUBS[e.subsKey]?'<span class="badge bp">'+SUBS[e.subsKey].nombre+'</span>':'')
        +'<span class="edate">'+fmtDate(e.fecha)+'</span>'
        +'</div></div>';
    }
  }).join('');
  el.querySelectorAll('.edit-btn').forEach(function(b){
    b.addEventListener('click', function(){
      var src = this.getAttribute('data-src'), id = this.getAttribute('data-id');
      if (src==='gastos') editGEntry(id); else editTEntry(id);
    });
  });
  el.querySelectorAll('.del-btn').forEach(function(b){
    b.addEventListener('click', function(){
      delEntry(this.getAttribute('data-id'), this.getAttribute('data-src'));
    });
  });
}

function delEntry(id, src) {
  if (!confirm('Eliminas este registro?')) return;
  var fn = src==='gastos' ? postGasto : postTarjeta;
  fn({ action:'delete', id:id }, function(ok){
    if (ok) { toast('Eliminado'); setTimeout(function(){ loadAll(renderHist); }, 2000); }
    else toast('Error al eliminar');
  });
}

// ── RESUMEN ──
document.getElementById('r-mes').addEventListener('change', function(){ balanceOpen=false; renderRes(); });

function getTCardMontos(e) {
  if (e.tipoGasto==='suscripcion' && e.subsKey && SUBS[e.subsKey]) {
    var s=SUBS[e.subsKey], cuota=e.importe/s.total;
    return { sofi: cuota, guille: s.personas.indexOf('Guille')>=0 ? cuota : 0 };
  }
  if (e.tipoGasto==='compartido') return { sofi: e.montSofi, guille: e.montGuille };
  var esSofi = e.tarjeta.indexOf('Sofi')>=0;
  return { sofi: esSofi?e.importe:0, guille: esSofi?0:e.importe };
}

function renderRes() {
  var key = document.getElementById('r-mes').value;
  var p = key.split('-');
  var label = MESES[+p[1]] + ' ' + p[0];
  var gs = entriesG.filter(function(e){ return mk(e.fecha)===key; });
  var ts = entriesT.filter(function(e){ return mk(e.fecha)===key; });

  var gastosExp = gs.filter(function(e){ return e.tipo==='Gasto'; });
  var ingresos = gs.filter(function(e){ return e.tipo==='Ingreso'; });
  var tGastos = gastosExp.reduce(function(a,b){ return a+b.importe; },0);
  var tIngresos = ingresos.reduce(function(a,b){ return a+b.importe; },0);

  var compSofi = gastosExp.filter(function(e){ return e.quienDebe==='Sofi'; });
  var compGuille = gastosExp.filter(function(e){ return e.quienDebe==='Guille'; });
  var dSofiG = compSofi.reduce(function(a,b){ return a+b.importe/2; },0);
  var dGuilleG = compGuille.reduce(function(a,b){ return a+b.importe/2; },0);

  var pagosGuilleG = gs.filter(function(e){ return e.subcategoria==='Guille pago a Sofi'; });
  var pagosSofiG = gs.filter(function(e){ return e.subcategoria==='Sofi pago a Guille'; });
  var tPagGuilleG = pagosGuilleG.reduce(function(a,b){ return a+b.importe; },0);
  var tPagSofiG = pagosSofiG.reduce(function(a,b){ return a+b.importe; },0);

  var guilleDebe=0, sofiDebe=0;
  ts.forEach(function(e){
    var m = getTCardMontos(e);
    var esTarSofi = e.tarjeta.indexOf('Sofi')>=0;
    if (esTarSofi) guilleDebe += m.guille;
    else sofiDebe += m.sofi;
  });

  var sofiDebeTotal = Math.max(0, dSofiG + sofiDebe - tPagSofiG);
  var guilleDebeTotal = Math.max(0, dGuilleG + guilleDebe - tPagGuilleG);
  var netoMes = sofiDebeTotal - guilleDebeTotal;

  // Saldo arrastrado de meses anteriores
  var saldoAnt = calcSaldoAnterior(key); // positivo = Sofi le debia a Guille
  var netoTotal = netoMes + saldoAnt;

  var h = '<div class="sec-label">' + label + '</div>';

  var tTarjetas = ts.reduce(function(a,b){ return a+b.importe; },0);
  h += '<div class="stat-grid">'
    + '<div class="stat"><div class="slabel">Gastos</div><div class="sval red">'+ars(tGastos)+'</div></div>'
    + '<div class="stat"><div class="slabel">Tarjetas</div><div class="sval red">'+ars(tTarjetas)+'</div></div>'
    + '<div class="stat"><div class="slabel">Ingresos</div><div class="sval green">'+ars(tIngresos)+'</div></div>'
    + '<div class="stat"><div class="slabel">Registros</div><div class="sval">'+(gs.length+ts.length)+'</div></div>'
    + '</div>';

  // Saldo anterior si existe
  if (Math.abs(saldoAnt) > 1) {
    var sAntTexto = saldoAnt > 0 ? 'Sofi venia debiendo a Guille ' + ars(Math.abs(saldoAnt)) : 'Guille venia debiendo a Sofi ' + ars(Math.abs(saldoAnt));
    h += '<div class="saldo-card"><div class="saldo-label">Saldo arrastrado</div><div class="saldo-val">'+sAntTexto+'</div></div>';
  }

  // Balance neto total
  var balOk = Math.abs(netoTotal) < 1;
  var balTexto;
  if (balOk) balTexto = 'Estan al dia!';
  else if (netoTotal > 0) balTexto = 'Sofi le debe a Guille ' + ars(Math.abs(netoTotal));
  else balTexto = 'Guille le debe a Sofi ' + ars(Math.abs(netoTotal));

  h += '<div class="balance-card'+(balOk?' ok':'')+'" id="balance-banner">'
    + '<div class="b-label">Balance neto'+(Math.abs(saldoAnt)>1?' (incluye meses anteriores)':'')+'</div>'
    + '<div class="b-main">'+balTexto+'</div>'
    + (!balOk ? '<div class="b-tap">Toca para ver el detalle</div>' : '')
    + '<div class="b-detail" id="b-detail">';

  if (dSofiG + dGuilleG > 0) {
    h += '<div class="b-section-title">Gastos compartidos este mes</div>';
    compSofi.forEach(function(e){
      h += '<div class="b-item"><span class="b-item-name">'+e.detalle+' <span style="opacity:.5;font-size:11px;">('+fmtDate(e.fecha)+')</span></span><span class="b-item-amt">Sofi debe '+ars(e.importe/2)+'</span></div>';
    });
    compGuille.forEach(function(e){
      h += '<div class="b-item"><span class="b-item-name">'+e.detalle+' <span style="opacity:.5;font-size:11px;">('+fmtDate(e.fecha)+')</span></span><span class="b-item-amt">Guille debe '+ars(e.importe/2)+'</span></div>';
    });
  }
  if (guilleDebe + sofiDebe > 0) {
    h += '<div class="b-section-title">Tarjetas este mes</div>';
    ts.forEach(function(e){
      var m = getTCardMontos(e);
      var esTarSofi = e.tarjeta.indexOf('Sofi')>=0;
      var quien = esTarSofi ? m.guille : m.sofi;
      var lbl = esTarSofi ? 'Guille debe a Sofi' : 'Sofi debe a Guille';
      if (quien > 0) h += '<div class="b-item"><span class="b-item-name">'+e.detalle+' <span style="opacity:.5;font-size:11px;">('+e.tarjeta+')</span></span><span class="b-item-amt">'+lbl+' '+ars(quien)+'</span></div>';
    });
  }
  if (tPagGuilleG + tPagSofiG > 0) {
    h += '<div class="b-section-title">Pagos realizados</div>';
    pagosGuilleG.forEach(function(e){ h += '<div class="b-pago"><span class="b-pago-name">Guille pago a Sofi ('+fmtDate(e.fecha)+')</span><span class="b-pago-amt">'+ars(e.importe)+'</span></div>'; });
    pagosSofiG.forEach(function(e){ h += '<div class="b-pago"><span class="b-pago-name">Sofi pago a Guille ('+fmtDate(e.fecha)+')</span><span class="b-pago-amt">'+ars(e.importe)+'</span></div>'; });
  }
  if (Math.abs(saldoAnt) > 1) {
    h += '<div class="b-section-title">Arrastre de meses anteriores</div>';
    h += '<div class="b-item"><span class="b-item-name">Saldo pendiente</span><span class="b-item-amt">'+(saldoAnt>0?'Sofi debia '+ars(Math.abs(saldoAnt)):'Guille debia '+ars(Math.abs(saldoAnt)))+'</span></div>';
  }
  h += '</div></div>';

  // Categorias
  var pc = {};
  gastosExp.filter(function(e){ return e.categoria!=='Transferencias'; }).forEach(function(e){
    pc[e.categoria] = (pc[e.categoria]||0) + e.importe;
  });
  var cl = Object.entries(pc).sort(function(a,b){ return b[1]-a[1]; });
  if (cl.length) {
    var mx = cl[0][1];
    h += '<div class="card"><div class="card-title">Gastos por categoria</div>';
    cl.forEach(function(item){
      h += '<div class="bar-row"><div class="bar-label"><span class="bar-name">'+item[0]+'</span><span class="bar-val">'+ars(item[1])+'</span></div>'
        +'<div class="bar-track"><div class="bar-fill" style="width:'+Math.round(item[1]/mx*100)+'%"></div></div></div>';
    });
    h += '</div>';
  }

  // Tarjetas por tarjeta
  var TODAS = ['MACRO Sofi','NARANJA Sofi','BBVA Guille','MACRO Guille','MERCADO PAGO Guille'];
  var tarsConGasto = TODAS.filter(function(t){ return ts.some(function(e){ return e.tarjeta===t; }); });
  if (tarsConGasto.length) {
    h += '<div class="card"><div class="card-title">Detalle por tarjeta</div>';
    tarsConGasto.forEach(function(tarjeta){
      var gt = ts.filter(function(e){ return e.tarjeta===tarjeta; });
      var rTotal = gt.reduce(function(a,b){ return a+b.importe; },0);
      var esTarSofi = tarjeta.indexOf('Sofi')>=0;
      var rSofi=0, rGuille=0, deudasTar={};
      gt.forEach(function(e){
        var m=getTCardMontos(e); rSofi+=m.sofi; rGuille+=m.guille;
        if(e.tipoGasto==='suscripcion'&&e.subsKey&&SUBS[e.subsKey]){
          var s=SUBS[e.subsKey],cuota=e.importe/s.total;
          s.personas.filter(function(pp){return pp!=='Sofi'&&pp!=='Guille';}).forEach(function(pp){deudasTar[pp]=(deudasTar[pp]||0)+cuota;});
        }
      });
      h += '<div style="padding:12px 0;border-bottom:1px solid #F0EDE6;">'
        +'<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">'
        +'<span style="font-size:14px;font-weight:700;">'+tarjeta+'</span>'
        +'<span style="font-size:14px;font-weight:800;color:#DC2626;">'+ars(rTotal)+'</span></div>';
      gt.forEach(function(e){
        var m=getTCardMontos(e);
        h += '<div style="padding:4px 0;"><div style="display:flex;justify-content:space-between;">'
          +'<span style="font-size:12px;color:#555;flex:1;margin-right:8px;">'+e.detalle+'</span>'
          +'<span style="font-size:12px;font-weight:600;">'+ars(e.importe)+'</span>'
          +'</div><div style="display:flex;gap:8px;margin-top:2px;">';
        if(m.sofi>0) h+='<span style="font-size:11px;color:#C9406A;">Sofi '+ars(m.sofi)+'</span>';
        if(m.guille>0) h+='<span style="font-size:11px;color:#2563EB;">Guille '+ars(m.guille)+'</span>';
        if(e.tipoGasto==='suscripcion'&&e.subsKey&&SUBS[e.subsKey]){
          var s=SUBS[e.subsKey],cuota=e.importe/s.total;
          s.personas.filter(function(pp){return pp!=='Sofi'&&pp!=='Guille';}).forEach(function(pp){
            h+='<span style="font-size:11px;color:#6D28D9;">'+pp+' '+ars(cuota)+'</span>';
          });
        }
        h += '</div></div>';
      });
      h += '<div style="margin-top:8px;display:flex;gap:8px;flex-wrap:wrap;">';
      if(esTarSofi&&rGuille>0) h+='<span style="font-size:12px;font-weight:700;color:#2563EB;background:#EFF6FF;padding:4px 10px;border-radius:8px;">Guille a Sofi '+ars(rGuille)+'</span>';
      if(!esTarSofi&&rSofi>0) h+='<span style="font-size:12px;font-weight:700;color:#C9406A;background:#FDF0F4;padding:4px 10px;border-radius:8px;">Sofi a Guille '+ars(rSofi)+'</span>';
      Object.keys(deudasTar).forEach(function(pp){
        h+='<span style="font-size:12px;font-weight:700;color:#6D28D9;background:#F5F3FF;padding:4px 10px;border-radius:8px;">'+pp+' a Sofi '+ars(deudasTar[pp])+'</span>';
      });
      h += '</div></div>';
    });
    h += '</div>';
  }

  if (!cl.length && !tarsConGasto.length) h += '<div class="empty">Sin gastos este mes</div>';

  document.getElementById('r-content').innerHTML = h;

  var banner = document.getElementById('balance-banner');
  if (banner && !balOk) {
    banner.addEventListener('click', function(){
      balanceOpen = !balanceOpen;
      document.getElementById('b-detail').classList.toggle('open', balanceOpen);
      var tap = banner.querySelector('.b-tap');
      if (tap) tap.textContent = balanceOpen ? 'Toca para cerrar' : 'Toca para ver el detalle';
    });
  }
}

// ── INIT ──
try {
  var su = localStorage.getItem('fsg_user');
  if (su) setUsuario(su);
} catch(e) {}
